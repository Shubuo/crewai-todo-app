plan_operations_task:
  description: >
    Analyze the {project_name} requirements and outline the core features needed
    for a drone checklist application. Define the database schema (SQLite) and
    API endpoints required. Return a structured technical specification document.
  expected_output: >
    A detailed technical specification document including feature list, schema,
    and API endpoints.
  agent: operations_planner

design_safety_task:
  description: >
    Based on the technical specification, define the specific checklist items for
    Ortam Kontrolu, Ucus Oncesi, Ucus Sirasinda, Acil Durum, and Ucus Sonrasi.
    Provide these items in a structured Python list format to be seeded into the database.
  expected_output: >
    A Python-compatible list of tuples representing the default checklist items.
  agent: safety_designer

design_ui_task:
  description: >
    Create a detailed UI layout specification. Describe the HTML structure and CSS
    classes needed for a dark-mode industrial drone control dashboard. Include
    a FIPA Simulation visual panel specification.
  expected_output: >
    A UI design specification document with layout structures and CSS styling guidelines.
  agent: ui_designer

develop_application_task:
  description: >
    Using the specifications from the planner, safety designer, and UI designer,
    write the complete, runnable Python Flask application for {project_name}.
    - Use Flask for the web server and SQLite for persistence.
    - Write ALL the HTML/CSS/JS inside the python file using `render_template_string`.
    - Implement the endpoints and the FIPA Simulation UI.
    - Output MUST be the raw Python code ONLY. NO markdown fences. NO text.
  expected_output: >
    Raw, valid Python source code ready to be executed, saved to {output_file}.
  agent: full_stack_developer

qa_review_task:
  description: >
    Review the final generated code from the full_stack_developer. Check for
    Flask route consistency, valid HTML, and confirm that there are no markdown
    fences in the final output. If it looks correct, return the exact raw Python
    code. If there are fences, remove them.
  expected_output: >
    Clean, raw, runnable Python code without any markdown formatting.
  agent: qa_tester
