generate_todo_app_task:
  description: >
    Build the first single-agent baseline for {project_name}. Generate a complete
    Python Flask application and save it as {output_file}. The output must be a
    single file containing the backend plus the HTML, CSS, and JavaScript needed
    for the UI.

    Requirements:
    - Use Flask for the web server.
    - Use SQLite for persistence.
    - Support full CRUD operations for todos.
    - Each todo must include id, title, completed, and created_at fields.
    - Include routes or APIs for create, read, update, and delete.
    - Include a simple usable browser UI for adding, listing, editing, toggling,
      and deleting todos.
    - Keep the implementation self-contained and runnable with `python {output_file}`.
    - Prefer clear, maintainable code over unnecessary abstractions.
    - Return only raw Python source code with no markdown fences and no extra commentary.
  expected_output: >
    A complete runnable Python source file for a single-file Flask Todo App with
    SQLite persistence, ready to be written directly to {output_file}.
  agent: full_stack_developer
